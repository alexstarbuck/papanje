<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papanje — Meal Planner</title>

  <!-- Tom Select -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- App styles -->
  <link rel="stylesheet" href="style.css?v=2" />

</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>papa<span>nje</span></h1>
    <div class="week-selector">
      <label for="weekSelect">week</label>
      <select id="weekSelect">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
    </div>
  </header>

  <!-- NAV -->
  <nav>
    <button class="active" data-view="plan">Plan</button>
    <button data-view="shopper">Shopper</button>
  </nav>

  <!-- PLAN VIEW -->
  <div id="view-plan" class="view active">
    <div id="planGrid" class="plan-grid">
      <div class="state-msg">Loading plan...</div>
    </div>
  </div>

  <!-- SHOPPER VIEW -->
  <div id="view-shopper" class="view">
    <div class="shopper-header">
      <h2>Shopping list</h2>
    </div>
    <div id="shopperList">
      <div class="state-msg">Loading ingredients...</div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-label" id="modalLabel">Changing dish</div>
      <select id="dishSelect"></select>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>KBHR 570 AM · Northwestern Mining Co. · papanje v0.1</footer>

  <script>
    // ── CONFIG ──────────────────────────────────────────────
    const SUPABASE_URL = 'https://jjebajrnkrysrrkuafoe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ferpCd6L2QOpqF5tph_erw_y1YXAe8L';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── STATE ───────────────────────────────────────────────
    let currentWeek = 1;
    let tsInstance    = null; // Tom Select instance

    const DAYS  = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
    const MEALS = ['breakfast','lunch','dinner'];
    const PROTEIN_CLASS = {
      egg: 'p-egg', seafood: 'p-seafood', beef: 'p-beef',
      poultry: 'p-poultry', dairy: 'p-dairy', tofu: 'p-tofu'
    };

    // ── NAV ─────────────────────────────────────────────────
    document.querySelectorAll('nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`view-${btn.dataset.view}`).classList.add('active');
        if (btn.dataset.view === 'shopper') loadShopper();
      });
    });

    // ── WEEK SELECTOR ────────────────────────────────────────
    document.getElementById('weekSelect').addEventListener('change', e => {
      currentWeek = parseInt(e.target.value);
      loadPlan();
      if (document.getElementById('view-shopper').classList.contains('active')) loadShopper();
    });

    // ── LOAD PLAN ────────────────────────────────────────────
    async function loadPlan() {
      const grid = document.getElementById('planGrid');
      grid.innerHTML = '<div class="state-msg">Loading...</div>';

      const { data, error } = await db
        .from('planner')
        .select('id, week_day, meal_type, dish_name, dishes(protein)')
        .eq('week', currentWeek)
        .not('dish_name', 'is', null);

      if (error) {
        grid.innerHTML = `<div class="state-msg">Error: ${error.message}</div>`;
        return;
      }

      const plan = {};
      DAYS.forEach(d => { plan[d] = {}; MEALS.forEach(m => plan[d][m] = []); });
      data.forEach(row => {
        if (plan[row.week_day]?.[row.meal_type] !== undefined) {
          plan[row.week_day][row.meal_type].push(row);
        }
      });

      grid.innerHTML = DAYS.map(day => `
        <div class="day-card">
          <div class="day-header">${day.charAt(0).toUpperCase() + day.slice(1)}</div>
          ${MEALS.map(meal => `
            <div class="meal-row">
              <div class="meal-label">${meal}</div>
              <div class="meal-dishes">
                ${plan[day][meal].length
                  ? plan[day][meal].map(r => `
                      <div class="dish-chip"
                           data-id="${r.id}"
                           data-dish="${r.dish_name}"
                           data-day="${day}"
                           data-meal="${meal}">
                        <span class="protein-dot ${PROTEIN_CLASS[r.dishes?.protein] || 'p-default'}"></span>
                        ${r.dish_name}
                      </div>`).join('')
                  : '<span class="empty-slot">—</span>'
                }
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');

      // attach tap handlers
      document.querySelectorAll('.dish-chip').forEach(chip => {
        chip.addEventListener('click', () => openModal(
          parseInt(chip.dataset.id),
          chip.dataset.dish,
          chip.dataset.day,
          chip.dataset.meal
        ));
      });
    }

    // ── MODAL ────────────────────────────────────────────────
    async function openModal(rowId, currentDish, day, meal) {
      // update label
      document.getElementById('modalLabel').innerHTML =
        `${day.charAt(0).toUpperCase()+day.slice(1)} · ${meal} &nbsp;→&nbsp; <strong>${currentDish}</strong>`;

    // destroy previous instance
    if (tsInstance) { tsInstance.destroy(); tsInstance = null; }

    // reset select
    const sel = document.getElementById('dishSelect');
    sel.innerHTML = '';

    // open modal first, THEN init Tom Select after animation completes
    document.getElementById('modalBackdrop').classList.add('open');

    setTimeout(() => {
      tsInstance = new TomSelect(sel, {
        options: [],
        items: [],
        maxItems: 1,
        placeholder: 'Start typing a dish name...',
        dropdownParent: document.querySelector('#modalBackdrop .modal'),
        openOnFocus: true,
        closeAfterSelect: true,
        shouldLoad: (query) => query.length >= 2,
        load: async (query, callback) => {
          try {
            if (query.length < 2) return callback();
            const { data, error } = await db
              .from('dishes')
              .select('dish_name')
              .ilike('dish_name', `%${query}%`)
              .order('dish_name')
              .limit(10);

            if (error) throw error;
            callback((data || []).map(r => ({ value: r.dish_name, text: r.dish_name })));
          } catch (err) {
            console.error('Dish search failed', err);
            callback();
          }
        },
        onType: function(query) {
          // When query is too short, ensure no results are shown
          if ((query || '').length < 2) {
            this.clearOptions();
            this.refreshOptions(false);
            this.close();
            return;
          }
          this.open();
        },
        onItemAdd: async (value) => {
          if (!value) return;
          if (value === currentDish) { closeModal(); return; }
          await saveChange(rowId, value);
        },
        onClear: () => {
          // Allow backspace/clear to edit the search input without closing the modal
        }
      });
      tsInstance.focus();
      setTimeout(() => { tsInstance.focus(); }, 100);
    }, 250);
    }

    function closeModal() {
      document.getElementById('modalBackdrop').classList.remove('open');
      if (tsInstance) { tsInstance.destroy(); tsInstance = null; }
    }

    // close on backdrop tap
    document.getElementById('modalBackdrop').addEventListener('click', e => {
      if (e.target === document.getElementById('modalBackdrop')) closeModal();
    });

    // ── SAVE CHANGE ──────────────────────────────────────────
    async function saveChange(rowId, newDish) {
      const { error } = await db
        .from('planner')
        .update({ dish_name: newDish })
        .eq('id', rowId);

      if (error) {
        alert(`Save failed: ${error.message}`);
        return;
      }
      closeModal();
      loadPlan(); // refresh view
    }

    // ── LOAD SHOPPER ─────────────────────────────────────────
    async function loadShopper() {
      const container = document.getElementById('shopperList');
      container.innerHTML = '<div class="state-msg">Aggregating ingredients...</div>';

      const { data: planRows, error: planErr } = await db
        .from('planner')
        .select('dish_name')
        .eq('week', currentWeek)
        .not('dish_name', 'is', null);

      if (planErr) { container.innerHTML = `<div class="state-msg">Error: ${planErr.message}</div>`; return; }
      if (!planRows.length) { container.innerHTML = '<div class="state-msg">No dishes planned for this week.</div>'; return; }

      const dishCount = {};
      planRows.forEach(r => {
        dishCount[r.dish_name] = (dishCount[r.dish_name] || 0) + 1;
      });

      const { data: recipeRows, error: recipeErr } = await db
        .from('recipes')
        .select('dish_name, ingredient, quantity, unit, ingredients(ingredient_category)')
        .in('dish_name', Object.keys(dishCount));

      if (recipeErr) { container.innerHTML = `<div class="state-msg">Error: ${recipeErr.message}</div>`; return; }

      const agg = {};
      recipeRows.forEach(r => {
        const multiplier = dishCount[r.dish_name] || 1;
        const key = `${r.ingredient}||${r.unit || ''}`;
        if (!agg[key]) {
          agg[key] = { ingredient: r.ingredient, quantity: 0, unit: r.unit || '',
                       category: r.ingredients?.ingredient_category || 'other' };
        }
        agg[key].quantity += (r.quantity || 0) * multiplier;
      });

      const byCategory = {};
      Object.values(agg).forEach(item => {
        if (!byCategory[item.category]) byCategory[item.category] = [];
        byCategory[item.category].push(item);
      });

      const catOrder = ['produce','protein','dairy','pantry','spices','condiment','fermented','other'];
      const sorted = Object.keys(byCategory).sort((a, b) =>
        (catOrder.indexOf(a) === -1 ? 99 : catOrder.indexOf(a)) -
        (catOrder.indexOf(b) === -1 ? 99 : catOrder.indexOf(b))
      );

      container.innerHTML = sorted.map(cat => `
        <div class="category-group">
          <div class="category-label">${cat}</div>
          ${byCategory[cat]
            .sort((a, b) => a.ingredient.localeCompare(b.ingredient))
            .map(item => `
              <div class="ingredient-row">
                <span>${item.ingredient}</span>
                <span class="ingredient-qty">${item.quantity > 0 ? item.quantity : ''} ${item.unit}</span>
              </div>`).join('')}
        </div>`).join('');
    }

    // ── INIT ─────────────────────────────────────────────────
    loadPlan();
  </script>
</body>
</html>
